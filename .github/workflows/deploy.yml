name: Deploy to Hugging Face Spaces

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/hostedtoolcache

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
          rm -rf node_modules
          cd ..

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      - name: Clone HF Space
        run: |
          git clone https://user:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/YOUR-USERNAME/YOUR-SPACE hf_space

      - name: Copy files to HF Space
        run: |
          rsync -av \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude '__pycache__' \
            --exclude '*.pth' \
            --exclude '.venv' \
            ./ hf_space/

      - name: Push to HF Space
        run: |
          cd hf_space
          git config user.email "you@example.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Auto deploy from GitHub" || echo "No changes"
          git push